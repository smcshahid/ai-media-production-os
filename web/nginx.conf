server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable; always revalidate the HTML shell.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # API + WebSocket reverse proxy (Olares cluster — same-origin SPA build).
    location ~ ^/(health|audit|pipeline|assets|projects|ideas|export|lineage|ws|openapi\.json|docs|redoc)(/|$) {
        proxy_pass http://aimpos-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # SPA history fallback for client-side routes only (not missing static files).
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}

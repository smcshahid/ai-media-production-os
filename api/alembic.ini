# Alembic configuration for the AIMPOS-Spark Visual API (US-04 / T-04-02).
# The database URL is taken from the DATABASE_URL environment variable at
# runtime (see alembic/env.py); the value below is only a non-secret fallback
# used when DATABASE_URL is unset. Never put real credentials here.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Overridden by DATABASE_URL env var in env.py.
sqlalchemy.url = postgresql+psycopg://aimpos:postgres@localhost:5432/aimpos_spark

[post_write_hooks]
# Keep generated migrations formatted to the repo standard (coding-standards §90).
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# US-12 verification — ephemeral Temporal (auto-setup) + dedicated Postgres.
# Service name is intentionally `temporal` so the API (default TEMPORAL_ADDRESS=temporal:7233)
# and the worker both resolve it inside aimpos-mwayolares. Ephemeral (emptyDir) — verification only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-db
  namespace: aimpos-mwayolares
  labels:
    app: temporal-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-db
  template:
    metadata:
      labels:
        app: temporal-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PASSWORD
              value: temporal
            - name: POSTGRES_DB
              value: temporal
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-db
  namespace: aimpos-mwayolares
  labels:
    app: temporal-db
spec:
  type: ClusterIP
  selector:
    app: temporal-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: aimpos-mwayolares
  labels:
    app: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.26.2
          imagePullPolicy: IfNotPresent
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              value: temporal
            - name: POSTGRES_SEEDS
              value: temporal-db
          ports:
            - name: grpc
              containerPort: 7233
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: aimpos-mwayolares
  labels:
    app: temporal
spec:
  type: ClusterIP
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233

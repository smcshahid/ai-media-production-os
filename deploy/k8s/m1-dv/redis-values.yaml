# AIMPOS M1-DV — dedicated Redis (bitnami/redis standalone).
# No password for M1-DV lab; cluster-internal only.

fullnameOverride: aimpos-redis

image:
  registry: docker.io
  repository: bitnamilegacy/redis
  tag: 7.4.2-debian-12-r0
  pullPolicy: IfNotPresent

architecture: standalone

# Bitnami chart defaults load RediSearch/ReJSON modules; bitnamilegacy image lacks them.
commonConfiguration: |-
  appendonly yes
  save ""

auth:
  enabled: false

master:
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

replica:
  replicaCount: 0

service:
  type: ClusterIP
  ports:
    redis: 6379

metrics:
  enabled: false

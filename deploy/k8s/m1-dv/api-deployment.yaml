apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimpos-api
  namespace: aimpos-mwayolares
  labels:
    app: aimpos-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aimpos-api
  template:
    metadata:
      labels:
        app: aimpos-api
    spec:
      containers:
        - name: api
          image: REPLACE_AIMPOS_API_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: aimpos-api-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aimpos-api
  namespace: aimpos-mwayolares
  labels:
    app: aimpos-api
spec:
  type: ClusterIP
  selector:
    app: aimpos-api
  ports:
    - name: http
      port: 8000
      targetPort: http

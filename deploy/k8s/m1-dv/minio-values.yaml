# AIMPOS M1-DV — dedicated MinIO (bitnami/minio standalone).
# Secret aimpos-minio-auth keys: root-user, root-password.

fullnameOverride: aimpos-minio

image:
  registry: docker.io
  repository: bitnamilegacy/minio
  tag: 2024.12.18-debian-12-r0
  pullPolicy: IfNotPresent

mode: standalone

auth:
  existingSecret: aimpos-minio-auth
  rootUserSecretKey: root-user
  rootPasswordSecretKey: root-password

persistence:
  enabled: true
  size: 50Gi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

console:
  enabled: false

ingress:
  enabled: false

defaultBuckets: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi

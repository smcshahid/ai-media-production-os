# AIMPOS M1-DV — dedicated PostgreSQL (bitnami/postgresql).
# Install: helm upgrade --install aimpos-postgres bitnami/postgresql -n aimpos-mwayolares -f postgres-values.yaml
#
# Secret aimpos-postgres-auth key: postgres-password (created by deploy-infra.sh).

fullnameOverride: aimpos-postgres

image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
  tag: 16.6.0-debian-12-r2
  pullPolicy: IfNotPresent

volumePermissions:
  image:
    repository: bitnamilegacy/os-shell

auth:
  database: aimpos_spark
  username: aimpos
  existingSecret: aimpos-postgres-auth
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: postgres-password

primary:
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

service:
  type: ClusterIP
  ports:
    postgresql: 5432

ingress:
  enabled: false

metrics:
  enabled: false

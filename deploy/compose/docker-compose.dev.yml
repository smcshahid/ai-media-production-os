# AIMPOS-Spark Visual — local development overlay.
# Layer on top of the base file to publish service ports to the host
# for local tooling. Never use this overlay in a shared or production-like environment.
#
# Default dev path: local app (API/Worker/Postgres/…) + Olares shared Ollama/ComfyUI
# (24GB GPU). Run `make up-dev` — it starts SSH tunnels automatically.
#
# Usage (from repo root):
#   make up-dev
#
# Opt-in local GPU instead of Olares:  make up-dev-local-ai
name: aimpos-spark

services:
  postgresql:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    ports:
      - "6379:6379"

  temporal:
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

  temporal-ui:
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"

  ollama:
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  comfyui:
    ports:
      - "${COMFYUI_PORT:-8188}:8188"

  api:
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    ports:
      - "${WEB_PORT:-5173}:80"

  # Worker always targets Olares shared AI in dev (via host.docker.internal tunnels).
  # Values here override .env so a stale local .env cannot silently route to missing
  # in-compose ollama/comfyui services.
  worker:
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      COMFYUI_HOST: http://host.docker.internal:8190
      COMFYUI_WORKFLOW: flux_storyboard.json
      VIDEO_I2V_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"

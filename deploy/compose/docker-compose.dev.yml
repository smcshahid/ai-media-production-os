# AIMPOS-Spark Visual — local development overlay.
# Layer on top of the base file to publish service ports to the host
# for local tooling. Never use this overlay in a shared or production-like environment.
#
# Usage (from repo root):
#   docker compose -f deploy/compose/docker-compose.yml \
#     -f deploy/compose/docker-compose.dev.yml --env-file .env up -d
#
# Or via Makefile:  make up-dev
name: aimpos-spark

services:
  postgresql:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    ports:
      - "6379:6379"

  temporal:
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

  temporal-ui:
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"

  ollama:
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  comfyui:
    ports:
      - "${COMFYUI_PORT:-8188}:8188"

  api:
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    ports:
      - "${WEB_PORT:-5173}:80"

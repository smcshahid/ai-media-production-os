# AIMPOS-Spark Visual — full 9-service compose stack (T-02-01 / Sprint 1).
# Services: postgresql, minio, redis, api, web, worker, temporal, ollama, comfyui
# (+ one-shot minio-init, ollama-init helpers).
#
# Usage (from repo root):
#   cp .env.example .env        # first time only
#   docker compose -f deploy/compose/docker-compose.yml --env-file .env up -d
#
# Local dev with host ports: layer docker-compose.dev.yml (see Makefile up-dev).
name: aimpos-spark

services:
  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    # Least-privilege: only the three vars Postgres needs (#69 / TD-01).
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - aimpos-postgres-data:/var/lib/postgresql/data
      - ../init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aimpos-spark

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - aimpos-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aimpos-spark

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: ["/bin/sh", "/init/create-buckets.sh"]
    volumes:
      - ../init/minio:/init:ro
    networks:
      - aimpos-spark
    restart: "no"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aimpos-spark

  temporal:
    image: temporalio/auto-setup:1.26.2
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ../init/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    expose:
      - "7233"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - aimpos-spark

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aimpos-spark

  ollama:
    image: ollama/ollama:0.30.6
    profiles: ["local-ai"]
    restart: unless-stopped
    volumes:
      - aimpos-ollama-data:/root/.ollama
    expose:
      - "11434"
    # GPU mapping is required for inference; omitted on CPU-only hosts (compose config still valid).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aimpos-spark

  ollama-init:
    image: ollama/ollama:0.30.6
    profiles: ["local-ai"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
    entrypoint: ["/bin/sh", "/init/pull-models.sh"]
    volumes:
      - ../init/ollama:/init:ro
    networks:
      - aimpos-spark
    restart: "no"

  comfyui:
    image: yanwk/comfyui-boot:cu124-sdxl-20240919
    profiles: ["local-ai"]
    restart: unless-stopped
    volumes:
      - aimpos-comfyui-data:/data
    expose:
      - "8188"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8188/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - aimpos-spark

  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile
    image: aimpos-api:dev
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AIMPOS_API_TOKEN: ${AIMPOS_API_TOKEN}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      aimpos-spark:
        aliases:
          - aimpos-api

  worker:
    build:
      context: ../..
      dockerfile: worker/Dockerfile
    image: aimpos-worker:dev
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aimpos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-dev-password}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-aimpos-hot-assets}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      COMFYUI_HOST: ${COMFYUI_HOST:-http://comfyui:8188}
      AIMPOS_CONFIG_ROOT: /srv/configs
      # Storyboard image engine (workflow JSON selects SDXL/RealVisXL/Flux/Z-Image).
      COMFYUI_WORKFLOW: ${COMFYUI_WORKFLOW:-sdxl_storyboard_v2.json}
      COMFYUI_WIDTH: ${COMFYUI_WIDTH:-1344}
      COMFYUI_HEIGHT: ${COMFYUI_HEIGHT:-768}
      COMFYUI_GENERATE_TIMEOUT_S: ${COMFYUI_GENERATE_TIMEOUT_S:-180}
      # WAN 2.2 image-to-video (off here; enabled on the GPU/hybrid path).
      VIDEO_I2V_ENABLED: ${VIDEO_I2V_ENABLED:-false}
      VIDEO_I2V_WORKFLOW: ${VIDEO_I2V_WORKFLOW:-wan22_i2v.json}
      VIDEO_I2V_WIDTH: ${VIDEO_I2V_WIDTH:-832}
      VIDEO_I2V_HEIGHT: ${VIDEO_I2V_HEIGHT:-480}
      VIDEO_I2V_FRAMES: ${VIDEO_I2V_FRAMES:-81}
      VIDEO_I2V_FPS: ${VIDEO_I2V_FPS:-16}
      VIDEO_I2V_STEPS: ${VIDEO_I2V_STEPS:-20}
      VIDEO_I2V_TIMEOUT_S: ${VIDEO_I2V_TIMEOUT_S:-1200}
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'app.main' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - aimpos-spark

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: aimpos-web:dev
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aimpos-spark

networks:
  aimpos-spark:
    driver: bridge

volumes:
  aimpos-postgres-data:
  aimpos-minio-data:
  aimpos-ollama-data:
  aimpos-comfyui-data:

# AIMPOS-Spark Visual — Sprint-0 compose stack.
# T-02-02 lands the PostgreSQL service; T-02-03 adds MinIO + bucket init;
# later tasks append redis and api on the same internal `aimpos-spark` network.
#
# Usage (from repo root):
#   cp .env.example .env        # first time only
#   docker compose -f deploy/compose/docker-compose.yml --env-file .env up -d
#
# Or via Makefile:  make up
name: aimpos-spark

services:
  postgresql:
    image: postgres:16-alpine
    container_name: aimpos-postgresql
    restart: unless-stopped
    # Credentials and database name come from the repo .env (see .env.example).
    # The official image creates POSTGRES_USER/POSTGRES_DB on first boot.
    env_file:
      - ../../.env
    # Internal network only — no host port published in the base file.
    # Other services reach the database at `postgresql:5432`.
    # The dev overlay (docker-compose.dev.yml) publishes 5432 to the host
    # for local psql / GUI tooling.
    expose:
      - "5432"
    volumes:
      - aimpos-postgres-data:/var/lib/postgresql/data
      # Scripts here run once, in lexical order, on an empty data directory.
      - ../init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aimpos-spark

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: aimpos-minio
    restart: unless-stopped
    # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD come from the repo .env.
    env_file:
      - ../../.env
    command: server /data --console-address ":9001"
    # Internal network only (S3 API 9000, console 9001). The dev overlay
    # publishes these to the host for local tooling.
    expose:
      - "9000"
      - "9001"
    volumes:
      - aimpos-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aimpos-spark

  # One-shot bucket bootstrap. MinIO has no initdb hook, so a dedicated mc
  # container creates the bucket idempotently once MinIO reports healthy,
  # then exits. The bucket name is read from MINIO_BUCKET (.env).
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: aimpos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../../.env
    entrypoint: ["/bin/sh", "/init/create-buckets.sh"]
    volumes:
      - ../init/minio:/init:ro
    networks:
      - aimpos-spark
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: aimpos-redis
    restart: unless-stopped
    # Ephemeral cache/coordination for Sprint 0 — persistence disabled so a
    # restart starts clean (no RDB/AOF). Durable state lives in PostgreSQL.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Internal network only; the dev overlay publishes 6379 for local tooling.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aimpos-spark

  api:
    # Build context is the repo root so packages/ + api/ are both visible.
    build:
      context: ../..
      dockerfile: api/Dockerfile
    image: aimpos-api:dev
    container_name: aimpos-api
    restart: unless-stopped
    env_file:
      - ../../.env
    # Start only once the backing services report healthy so the first
    # /health probe reflects a real stack.
    depends_on:
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Internal network only; the dev overlay publishes API_PORT for local access.
    expose:
      - "8000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aimpos-spark

  web:
    # React SPA built and served by nginx. Build context is the repo root for
    # parity with the api service. VITE_API_URL is baked at build time and must
    # point at where the *browser* reaches the API (the host-published port),
    # so the dev overlay publishes both web (5173) and api (8000) to localhost.
    build:
      context: ../..
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: aimpos-web:dev
    container_name: aimpos-web
    restart: unless-stopped
    depends_on:
      - api
    # Internal network only; the dev overlay publishes 5173 -> 80 to the host.
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aimpos-spark

networks:
  aimpos-spark:
    name: aimpos-spark
    driver: bridge

volumes:
  aimpos-postgres-data:
    name: aimpos-postgres-data
  aimpos-minio-data:
    name: aimpos-minio-data

version: v1
agent_id: agent.screenwriter
system: |
  You are the Screenwriter for AIMPOS-Spark Visual. Convert an approved story
  treatment into a Fountain screenplay. Output Fountain plain text only — no
  markdown, no code fences, no commentary.
user_template: |
  Write a Fountain screenplay with {scene_word}.

  Requirements:
  - Optional title page lines: Title:, Author:, Credit:
  {scene_rules}
  - At least one action paragraph after each scene heading
  - At least one character name in ALL CAPS followed by dialogue per scene
  - Output Fountain plain text only

  Approved story treatment:
  {story_text}
temperature: 0.7
num_predict: 2048

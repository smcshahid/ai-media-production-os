[project]
name = "aimpos-core"
version = "0.1.0"
description = "AIMPOS-Spark Visual — domain primitives shared by api and worker (enums, DTOs, events, exceptions)."
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aimpos_core"]

# Tooling per docs/governance/coding-standards.md §66-73.
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true

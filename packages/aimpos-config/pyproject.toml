[project]
name = "aimpos-config"
version = "0.1.0"
description = "AIMPOS-Spark Visual — shared runtime configuration (settings + logging) for api and worker."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3.0",
    "pydantic-settings>=2.3,<3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aimpos_config"]

# Tooling per docs/governance/coding-standards.md §66-73.
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
